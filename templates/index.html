<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarvam AI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Sarvam AI Assistant</h1>
            <p>Your guide to India's Sovereign AI Platform</p>
            <p class="subtitle">Ask about Sarvam AI features, products, APIs, and more!</p>
        </div>

        <div class="language-selector">
            <label for="language">Select Language:</label>
            <select id="language">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="kn">Kannada</option>
                <option value="ml">Malayalam</option>
                <option value="mr">Marathi</option>
                <option value="gu">Gujarati</option>
                <option value="bn">Bengali</option>
                <option value="pa">Punjabi</option>
            </select>
        </div>

        <div class="chatbox">
            <div id="messages" class="messages"></div>
        </div>

        <div class="input-container">
            <div class="input-group">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Ask about Sarvam AI, STT, TTS, LLM, APIs..." 
                    autocomplete="off"
                >
                <button id="sendBtn" class="btn btn-send">Send</button>
            </div>

            <div class="voice-input">
                <button id="recordBtn" class="btn btn-voice" title="Record audio">
                    <span class="mic-icon">🎤</span> Record
                </button>
                <button id="stopBtn" class="btn btn-stop" style="display: none;" title="Stop recording">
                    ⏹️ Stop
                </button>
            </div>

            <div id="recordingStatus" class="recording-status"></div>
        </div>

        <div class="settings">
            <details>
                <summary>⚙️ Settings</summary>
                <div class="settings-content">
                    <label>
                        <input type="checkbox" id="autoPlay" checked>
                        Auto-play responses (TTS)
                    </label>
                    <label>
                        <input type="checkbox" id="darkMode">
                        Dark Mode
                    </label>
                </div>
            </details>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
